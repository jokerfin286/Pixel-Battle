<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Battle · Чистая версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #151518;
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            height: 100vh;
            touch-action: none;
            user-select: none;
            color: #fff;
            overflow: hidden;
        }

        #viewport {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        #viewport:active {
            cursor: grabbing;
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .top-bar {
            position: absolute;
            top: calc(16px + env(safe-area-inset-top, 0px));
            left: calc(16px + env(safe-area-inset-left, 0px));
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .pill {
            background: #222224;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.2px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .minimap {
            position: absolute;
            top: calc(16px + env(safe-area-inset-top, 0px));
            right: calc(16px + env(safe-area-inset-right, 0px));
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 32px rgba(0,0,0,0.6);
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            background: #151518;
        }

        #minimap {
            display: block;
            width: 140px;
            height: 140px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .minimap-vp {
            position: absolute;
            border: 2px solid #f33;
            pointer-events: none;
            box-sizing: border-box;
        }

        .zoom-controls {
            position: absolute;
            bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            left: calc(16px + env(safe-area-inset-left, 0px));
            display: flex;
            flex-direction: column;
            gap: 2px;
            pointer-events: auto;
        }

        .zoom-btn {
            width: 32px;
            height: 32px;
            background: #222224;
            border: none;
            border-radius: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
        }

        .zoom-btn:hover {
            color: #fff;
            background: rgba(0,0,0,0.7);
        }

        .color-panel {
            position: absolute;
            bottom: calc(24px + env(safe-area-inset-bottom, 0px));
            right: calc(16px + env(safe-area-inset-right, 0px));
            background: #222224;
            border-radius: 16px;
            padding: 20px;
            width: 280px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .color-swatch {
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }

        .color-swatch:hover {
            transform: scale(1.15);
            border-color: rgba(255,255,255,0.5);
        }

        .color-swatch.active {
            border-color: #fff;
        }

        .place-button {
            width: 100%;
            background: #fff;
            border: none;
            color: #151518;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .place-button:hover:not(:disabled) {
            background: #f0f0f0;
        }

        .place-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .timer-container {
            margin-top: 12px;
        }

        .timer-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 1.5px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .timer-fill {
            height: 100%;
            background: #fff;
            border-radius: 1.5px;
            transition: width 0.05s linear;
            width: 100%;
        }

        .timer-text {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 600px) {
            .color-panel {
                width: calc(100% - 32px);
                right: 16px;
            }
            
            .minimap {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="viewport"></canvas>
    
    <div class="ui-layer">
        <div class="top-bar">
            <div class="pill" id="coordsDisplay">503, 315</div>
            <div class="pill" id="zoomDisplay">81%</div>
        </div>
        
        <div class="minimap" id="minimapContainer">
            <canvas id="minimap" width="140" height="140"></canvas>
            <div class="minimap-vp" id="minimapViewport"></div>
        </div>
        
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomInBtn">+</button>
            <button class="zoom-btn" id="zoomOutBtn">−</button>
            <button class="zoom-btn" id="zoomFitBtn" style="font-size:12px">⊡</button>
        </div>
        
        <div class="color-panel">
            <div class="color-grid" id="colorGrid"></div>
            <button class="place-button" id="placeButton">Поставить</button>
            <div class="timer-container">
                <div class="timer-bar">
                    <div id="timerFill" class="timer-fill"></div>
                </div>
                <div class="timer-text" id="timerText">Готов к установке</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";
            
            const CANVAS_SIZE = 1024;
            const COOLDOWN_MS = 5000;
            const MIN_ZOOM = 0.1;
            const MAX_ZOOM = 80;
            const ZOOM_SPEED = 0.025;
            
            const viewport = document.getElementById('viewport');
            const ctx = viewport.getContext('2d', { alpha: false });
            const minimapCanvas = document.getElementById('minimap');
            const minimapCtx = minimapCanvas.getContext('2d', { alpha: false });
            const minimapVP = document.getElementById('minimapViewport');
            const coordsDisplay = document.getElementById('coordsDisplay');
            const zoomDisplay = document.getElementById('zoomDisplay');
            const timerText = document.getElementById('timerText');
            const timerFill = document.getElementById('timerFill');
            const placeButton = document.getElementById('placeButton');
            const colorGrid = document.getElementById('colorGrid');
            
            const offscreenCanvas = document.createElement('canvas');
            offscreenCanvas.width = CANVAS_SIZE;
            offscreenCanvas.height = CANVAS_SIZE;
            const offscreenCtx = offscreenCanvas.getContext('2d', { alpha: false });
            const imageData = offscreenCtx.createImageData(CANVAS_SIZE, CANVAS_SIZE);
            const data = new Uint32Array(imageData.data.buffer);
            
            data.fill(0xFFFFFFFF);
            offscreenCtx.putImageData(imageData, 0, 0);
            
            let zoom = 0.81;
            let zoomMomentum = 0;
            let panX = 0, panY = 0;
            let velocityX = 0, velocityY = 0;
            let isDragging = false;
            let lastMouseX = 0, lastMouseY = 0;
            let animationFrame = null;
            
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            
            let selectedX = 503, selectedY = 315;
            let currentColor = '#FFFFFF';
            
            let lastPlaceTime = 0;
            let cooldownInterval = null;
            let nextPlaceAllowed = true;
            
            const presetColors = [
                '#FFFFFF', '#E4E4E4', '#888888', '#222222', '#000000',
                '#5A301D', '#A06A42', '#FFC48C', '#6D001A', '#BE0039',
                '#E50000', '#FF3881', '#FFA7D1', '#DE107F', '#E59500',
                '#FFA800', '#E5D900', '#FFF8B8', '#005F39', '#02BE01',
                '#94E044', '#00756F', '#0000EA', '#0083C7', '#3690EA',
                '#00D3DD', '#51E9F4', '#493AC1', '#6A5CFF', '#B44AC0',
                '#811E9F', '#2B2D42'
            ];
            
            function initColorGrid() {
                colorGrid.innerHTML = '';
                presetColors.forEach(hex => {
                    const swatch = document.createElement('div');
                    swatch.className = 'color-swatch';
                    swatch.style.backgroundColor = hex;
                    swatch.dataset.color = hex;
                    swatch.addEventListener('click', () => setCurrentColor(hex));
                    colorGrid.appendChild(swatch);
                });
            }
            
            function setCurrentColor(hex) {
                currentColor = hex.toUpperCase();
                
                document.querySelectorAll('.color-swatch').forEach(el => {
                    el.classList.toggle('active', el.dataset.color === currentColor);
                });
            }
            
            function hexToUint32(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return 0xFF000000 | (b << 16) | (g << 8) | r;
            }
            
            function physicsAnimation() {
                let needsRender = false;
                const devicePixelRatio = window.devicePixelRatio || 1;
                
                if (Math.abs(zoomMomentum) > 0.001) {
                    const worldX = (mouseX - panX) / zoom;
                    const worldY = (mouseY - panY) / zoom;
                    
                    const zoomFactor = 1 + zoomMomentum;
                    const newZoom = zoom * zoomFactor;
                    
                    if (newZoom >= MIN_ZOOM && newZoom <= MAX_ZOOM) {
                        zoom = newZoom;
                        panX = mouseX - worldX * zoom;
                        panY = mouseY - worldY * zoom;
                    } else {
                        zoomMomentum = 0;
                    }
                    
                    zoomMomentum *= 0.88;
                    needsRender = true;
                }
                
                if (Math.abs(velocityX) > 0.05 || Math.abs(velocityY) > 0.05) {
                    panX += velocityX;
                    panY += velocityY;
                    velocityX *= 0.92;
                    velocityY *= 0.92;
                    needsRender = true;
                }
                
                if (needsRender) {
                    render();
                }
                
                animationFrame = requestAnimationFrame(physicsAnimation);
            }
            
            function render() {
                const w = viewport.width = window.innerWidth * devicePixelRatio;
                const h = viewport.height = window.innerHeight * devicePixelRatio;
                const dpr = window.devicePixelRatio || 1;
                
                ctx.fillStyle = '#151518';
                ctx.fillRect(0, 0, w, h);
                
                ctx.save();
                ctx.translate(panX * dpr, panY * dpr);
                ctx.scale(zoom * dpr, zoom * dpr);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(offscreenCanvas, 0, 0);
                
                if (selectedX >= 0 && selectedY >= 0) {
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2 / zoom;
                    ctx.strokeRect(selectedX, selectedY, 1, 1);
                }
                
                ctx.restore();
                
                updateMinimap();
                zoomDisplay.textContent = Math.round(zoom * 100) + '%';
            }
            
            function updateMinimap() {
                minimapCtx.fillStyle = '#151518';
                minimapCtx.fillRect(0, 0, 140, 140);
                
                minimapCtx.imageSmoothingEnabled = false;
                minimapCtx.drawImage(offscreenCanvas, 0, 0, 140, 140);
                
                const vpW = (window.innerWidth / zoom) / CANVAS_SIZE * 140;
                const vpH = (window.innerHeight / zoom) / CANVAS_SIZE * 140;
                const vpX = (-panX / zoom) / CANVAS_SIZE * 140;
                const vpY = (-panY / zoom) / CANVAS_SIZE * 140;
                
                minimapVP.style.left = Math.max(0, Math.min(140 - vpW, vpX)) + 'px';
                minimapVP.style.top = Math.max(0, Math.min(140 - vpH, vpY)) + 'px';
                minimapVP.style.width = Math.min(vpW, 140) + 'px';
                minimapVP.style.height = Math.min(vpH, 140) + 'px';
            }
            
            function screenToCanvas(screenX, screenY) {
                const rect = viewport.getBoundingClientRect();
                return {
                    x: Math.floor((screenX - rect.left - panX) / zoom),
                    y: Math.floor((screenY - rect.top - panY) / zoom)
                };
            }
            
            let db = null;
            
            function initDB() {
                return new Promise((resolve) => {
                    const request = indexedDB.open('PixelCanvasDB', 1);
                    
                    request.onerror = () => {
                        console.error('[v0] Failed to open IndexedDB');
                        resolve(false);
                    };
                    
                    request.onsuccess = () => {
                        db = request.result;
                        console.log('[v0] IndexedDB opened');
                        resolve(true);
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const database = event.target.result;
                        if (!database.objectStoreNames.contains('canvas')) {
                            database.createObjectStore('canvas');
                        }
                    };
                });
            }
            
            function saveCanvas() {
                if (!db) return;
                
                try {
                    const transaction = db.transaction(['canvas'], 'readwrite');
                    const store = transaction.objectStore('canvas');
                    const blob = new Blob([imageData.data], { type: 'application/octet-stream' });
                    store.put(blob, 'pixelData');
                    console.log('[v0] Canvas saved to IndexedDB');
                } catch (e) {
                    console.error('[v0] Failed to save canvas:', e);
                }
            }
            
            function loadCanvas() {
                return new Promise((resolve) => {
                    if (!db) {
                        resolve();
                        return;
                    }
                    
                    try {
                        const transaction = db.transaction(['canvas'], 'readonly');
                        const store = transaction.objectStore('canvas');
                        const request = store.get('pixelData');
                        
                        request.onsuccess = () => {
                            const blob = request.result;
                            if (blob) {
                                const reader = new FileReader();
                                reader.onload = () => {
                                    const arrayBuffer = reader.result;
                                    const uint8Array = new Uint8Array(arrayBuffer);
                                    for (let i = 0; i < uint8Array.length && i < imageData.data.length; i++) {
                                        imageData.data[i] = uint8Array[i];
                                    }
                                    offscreenCtx.putImageData(imageData, 0, 0);
                                    console.log('[v0] Canvas loaded from IndexedDB');
                                    updateMinimap();
                                    render();
                                    resolve();
                                };
                                reader.readAsArrayBuffer(blob);
                            } else {
                                updateMinimap();
                                render();
                                resolve();
                            }
                        };
                        
                        request.onerror = () => {
                            console.error('[v0] Failed to load canvas');
                            updateMinimap();
                            render();
                            resolve();
                        };
                    } catch (e) {
                        console.error('[v0] Error loading canvas:', e);
                        updateMinimap();
                        render();
                        resolve();
                    }
                });
            }
            
            function placePixel() {
                if (!nextPlaceAllowed) return;
                if (selectedX < 0 || selectedY < 0) return;
                
                const colorValue = hexToUint32(currentColor);
                
                data[selectedY * CANVAS_SIZE + selectedX] = colorValue;
                offscreenCtx.putImageData(imageData, 0, 0);
                
                saveCanvas();
                updateMinimap();
                
                startCooldown();
                render();
            }
            
            function startCooldown() {
                lastPlaceTime = Date.now();
                nextPlaceAllowed = false;
                placeButton.disabled = true;
                
                if (cooldownInterval) clearInterval(cooldownInterval);
                cooldownInterval = setInterval(updateTimerDisplay, 50);
                updateTimerDisplay();
            }
            
            function updateTimerDisplay() {
                const remaining = Math.max(0, COOLDOWN_MS - (Date.now() - lastPlaceTime));
                const percent = (remaining / COOLDOWN_MS) * 100;
                
                timerFill.style.width = percent + '%';
                
                if (remaining <= 0) {
                    timerText.textContent = 'Готов к установке';
                    placeButton.disabled = false;
                    nextPlaceAllowed = true;
                    clearInterval(cooldownInterval);
                    cooldownInterval = null;
                    timerFill.style.width = '100%';
                } else {
                    timerText.textContent = `Подождите ${(remaining / 1000).toFixed(1)}с`;
                }
            }
            
            function onMouseDown(e) {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                velocityX = velocityY = 0;
                zoomMomentum = 0;
                viewport.style.cursor = 'grabbing';
            }
            
            function onMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                const pos = screenToCanvas(e.clientX, e.clientY);
                if (pos.x >= 0 && pos.x < CANVAS_SIZE && pos.y >= 0 && pos.y < CANVAS_SIZE) {
                    coordsDisplay.textContent = `${pos.x}, ${pos.y}`;
                }
                
                if (isDragging) {
                    const dx = e.clientX - lastMouseX;
                    const dy = e.clientY - lastMouseY;
                    
                    panX += dx;
                    panY += dy;
                    
                    velocityX = dx * 0.5;
                    velocityY = dy * 0.5;
                    
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    
                    render();
                }
            }
            
            function onMouseUp() {
                isDragging = false;
                viewport.style.cursor = 'grab';
            }
            
            function onClick(e) {
                if (Math.abs(velocityX) > 1 || Math.abs(velocityY) > 1) return;
                
                const pos = screenToCanvas(e.clientX, e.clientY);
                if (pos.x >= 0 && pos.x < CANVAS_SIZE && pos.y >= 0 && pos.y < CANVAS_SIZE) {
                    selectedX = pos.x;
                    selectedY = pos.y;
                    render();
                    placePixel();
                }
            }
            
            function onWheel(e) {
                e.preventDefault();
                
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                const delta = e.deltaY > 0 ? -ZOOM_SPEED : ZOOM_SPEED;
                zoomMomentum += delta;
                zoomMomentum = Math.max(-0.15, Math.min(0.15, zoomMomentum));
            }
            
            function changeZoom(delta) {
                const rect = viewport.getBoundingClientRect();
                mouseX = rect.width / 2;
                mouseY = rect.height / 2;
                
                zoomMomentum += delta * 0.03;
                zoomMomentum = Math.max(-0.12, Math.min(0.12, zoomMomentum));
            }
            
            async function init() {
                await initDB();
                initColorGrid();
                setCurrentColor('#FFFFFF');
                
                panX = (window.innerWidth - CANVAS_SIZE * zoom) / 2;
                panY = (window.innerHeight - CANVAS_SIZE * zoom) / 2;
                
                await loadCanvas();
                
                viewport.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                viewport.addEventListener('click', onClick);
                viewport.addEventListener('wheel', onWheel, { passive: false });
                window.addEventListener('resize', () => render());
                
                placeButton.addEventListener('click', placePixel);
                
                document.getElementById('zoomInBtn').addEventListener('click', () => changeZoom(1));
                document.getElementById('zoomOutBtn').addEventListener('click', () => changeZoom(-1));
                document.getElementById('zoomFitBtn').addEventListener('click', () => {
                    zoom = 0.81;
                    zoomMomentum = 0;
                    panX = (window.innerWidth - CANVAS_SIZE * zoom) / 2;
                    panY = (window.innerHeight - CANVAS_SIZE * zoom) / 2;
                    velocityX = velocityY = 0;
                    render();
                });
                
                document.getElementById('minimapContainer').addEventListener('click', (e) => {
                    const rect = minimapCanvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / 140 * CANVAS_SIZE;
                    const y = (e.clientY - rect.top) / 140 * CANVAS_SIZE;
                    
                    panX = window.innerWidth / 2 - x * zoom;
                    panY = window.innerHeight / 2 - y * zoom;
                    velocityX = velocityY = 0;
                    render();
                });
                
                render();
                updateTimerDisplay();
                physicsAnimation();
            }
            
            init();
        })();
    </script>
</body>
</html>
